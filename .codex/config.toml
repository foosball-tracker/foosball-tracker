[mcp_servers.sonarqube]
url = "https://api.sonarcloud.io/mcp"
bearer_token_env_var = "SONARQUBE_TOKEN"
http_headers = { SONARQUBE_ORG = "foosball-tracker", SONARQUBE_PROJECT_KEY = "foosball-tracker_foosball-tracker", SONARQUBE_READ_ONLY = "true" }

[mcp_servers.playwright]
command = "node"
args = [".codex/playwright-mcp-launcher.mjs"]

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]
