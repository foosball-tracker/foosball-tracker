name: E2E Tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Generate PR proof screenshots
        if: always()
        run: |
          pnpm ui:inspect:start
          pnpm proof:screenshots
          pnpm ui:inspect:stop

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Upload screenshots
        if: always()
        id: upload_screenshots
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: e2e/screenshots/
          retention-days: 7

      - name: Publish PR proof screenshots
        if: always() && github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork
        id: publish_screenshots
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          branch="pr-proof-assets"
          pr_dir="pr-${PR_NUMBER}/latest"
          worktree_dir="$(mktemp -d)"

          cleanup() {
            git worktree remove "$worktree_dir" --force >/dev/null 2>&1 || true
          }

          trap cleanup EXIT

          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            git fetch --no-tags origin "$branch"
            git worktree add "$worktree_dir" "origin/$branch"
            cd "$worktree_dir"
            git checkout -B "$branch" "origin/$branch"
          else
            git worktree add --detach "$worktree_dir"
            cd "$worktree_dir"
            git checkout --orphan "$branch"
            git rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p "$pr_dir"
          rm -rf "$pr_dir"/*
          cp -R "$GITHUB_WORKSPACE/e2e/screenshots/pr-proof/." "$pr_dir/"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$pr_dir"

          if git diff --cached --quiet; then
            echo "No screenshot changes to publish."
          else
            git commit -m "chore: update PR ${PR_NUMBER} proof screenshots"
            git push origin HEAD:"$branch"
          fi

          {
            echo "raw_base=https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${branch}/${pr_dir}"
            echo "blob_base=https://github.com/${GITHUB_REPOSITORY}/blob/${branch}/${pr_dir}"
          } >> "$GITHUB_OUTPUT"

      - name: Comment PR with screenshot previews
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          ARTIFACT_URL: ${{ steps.upload_screenshots.outputs.artifact-url }}
          RAW_BASE: ${{ steps.publish_screenshots.outputs.raw_base }}
          BLOB_BASE: ${{ steps.publish_screenshots.outputs.blob_base }}
        with:
          script: |
            const workflowRunUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const screenshotNames = [
              ["Home desktop", "home-desktop.png"],
              ["Home mobile", "home-mobile.png"],
              ["Players desktop", "players-desktop.png"],
              ["Players mobile", "players-mobile.png"],
              ["Teams desktop", "teams-desktop.png"],
              ["Teams mobile", "teams-mobile.png"],
            ];

            const rawBase = process.env.RAW_BASE;
            const blobBase = process.env.BLOB_BASE;
            const artifactUrl = process.env.ARTIFACT_URL;
            const canInline = Boolean(rawBase && blobBase);

            const lines = [
              "<!-- pr-proof-screenshots -->",
              "Latest UI proof screenshots for this PR:",
              "",
            ];

            if (canInline) {
              lines.push(
                `<a href="${blobBase}/home-desktop.png"><img src="${rawBase}/home-desktop.png" alt="Home desktop screenshot" width="320"></a>`,
                `<a href="${blobBase}/players-desktop.png"><img src="${rawBase}/players-desktop.png" alt="Players desktop screenshot" width="320"></a>`,
                `<a href="${blobBase}/teams-desktop.png"><img src="${rawBase}/teams-desktop.png" alt="Teams desktop screenshot" width="320"></a>`,
                "",
                "Direct screenshot links:",
                ...screenshotNames.map(([label, file]) => `- [${label}](${blobBase}/${file})`),
                ""
              );
            } else {
              lines.push(
                "Inline previews were skipped because this PR does not have permission to publish proof images back to the repository.",
                ""
              );
            }

            lines.push(
              `Fallback artifact: [e2e-screenshots](${artifactUrl})`,
              `Workflow run: ${workflowRunUrl}`
            );

            const body = lines.join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((comment) =>
              comment.body.includes("<!-- pr-proof-screenshots -->")
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
